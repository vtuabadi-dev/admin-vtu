# ============================================================
# VTU OPERASIONAL — Nginx Reverse Proxy (VPS)
# ============================================================
# Target: Ubuntu 22.04+ with Nginx 1.24+
#
# Setup:
#   1. sudo cp deploy/nginx.conf /etc/nginx/sites-available/vtu
#   2. sudo ln -s /etc/nginx/sites-available/vtu /etc/nginx/sites-enabled/
#   3. sudo nginx -t && sudo systemctl reload nginx
#
# SSL (Let's Encrypt):
#   1. sudo apt install certbot python3-certbot-nginx
#   2. sudo certbot --nginx -d vtu.example.com
# ============================================================

upstream vtu_frontend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# ── HTTP → HTTPS redirect ────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name vtu.example.com;

    # Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vtu.example.com;

    # SSL — managed by certbot
    ssl_certificate     /etc/letsencrypt/live/vtu.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vtu.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options       "DENY"          always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Upload size limit (10MB documents, 5MB payments)
    client_max_body_size 10m;
    client_body_buffer_size 128k;
    client_body_timeout 60s;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;
    gzip_comp_level 5;

    # ── Frontend (Next.js) ────────────────────────────
    location / {
        proxy_pass         http://vtu_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering    off;
        proxy_buffer_size  128k;
        proxy_buffers      4 256k;
    }

    # ── Login rate limit ─────────────────────────────
    location /api/auth/callback/credentials {
        limit_req zone=login burst=3 nodelay;
        proxy_pass         http://vtu_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── API rate limit ──────────────────────────────
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass         http://vtu_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Health check (no rate limit) ─────────────────
    location /api/health {
        proxy_pass         http://vtu_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Static assets (cache) ────────────────────────
    location /_next/static {
        proxy_pass         http://vtu_frontend;
        proxy_cache_valid  200 1d;
        add_header         Cache-Control "public, max-age=86400, immutable";
    }
}
