# ============================================================
# VTU CORE — Production Docker Compose (simplified)
# ============================================================
# Prerequisites:
#   1. Copy .env.example to .env and fill in real secrets
#   2. Generate AUTH_SECRET:  openssl rand -hex 32
#   3. Set strong POSTGRES_PASSWORD
#
# Deploy:
#   docker compose up -d --build
#
# Update:
#   git pull
#   docker compose up -d --build
#
# Services:
#   frontend   — Next.js 14 (App Router, standalone output)
#   postgres   — PostgreSQL 16
# ============================================================

services:
  # ── Frontend / API (Next.js) ──────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vtu-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    env_file:
      - .env.docker
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - STORAGE_PATH=/storage
      # Auth.js v5 — all four env vars required for correct operation
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=${AUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      # Trust host in production (set by AUTH_URL above in @auth/core)
      - AUTH_TRUST_HOST=${AUTH_TRUST_HOST:-true}
    volumes:
      - storage_passports:/storage/passports
      - storage_ktp:/storage/ktp
      - storage_vaccines:/storage/vaccines
      - storage_pasfoto:/storage/pasfoto
      - storage_exports:/storage/exports
      - storage_temp:/storage/temp
      - storage_invoices:/storage/invoices
      - storage_manifests:/storage/manifests
      - storage_backups:/storage/backups
      - storage_dokumen:/storage/dokumen
    networks:
      - vtu_network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  # ── PostgreSQL 16 ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vtu-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vtu_operasional}
      POSTGRES_USER: ${POSTGRES_USER:-vtu_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - vtu_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-vtu_admin} -d ${POSTGRES_DB:-vtu_operasional}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

# ── Named Volumes ───────────────────────────────────────────
volumes:
  pgdata:
    name: vtu_pgdata
    driver: local

  storage_passports:
    name: vtu_storage_passports
    driver: local
  storage_ktp:
    name: vtu_storage_ktp
    driver: local
  storage_vaccines:
    name: vtu_storage_vaccines
    driver: local
  storage_pasfoto:
    name: vtu_storage_pasfoto
    driver: local
  storage_exports:
    name: vtu_storage_exports
    driver: local
  storage_temp:
    name: vtu_storage_temp
    driver: local
  storage_invoices:
    name: vtu_storage_invoices
    driver: local
  storage_manifests:
    name: vtu_storage_manifests
    driver: local
  storage_backups:
    name: vtu_storage_backups
    driver: local
  storage_dokumen:
    name: vtu_storage_dokumen
    driver: local

# ── Network ─────────────────────────────────────────────────
networks:
  vtu_network:
    name: vtu_network
    driver: bridge
